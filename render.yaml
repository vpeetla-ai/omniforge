services:
  - type: web
    name: omniforge-api
    runtime: python
    plan: free
    buildCommand: pip install -e ".[api]"
    startCommand: gunicorn api.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AGENTFINOPS_API_KEY
        sync: false
      - key: AGENTFINOPS_URL
        value: https://agent-finops-api.onrender.com
      - key: LLM_GATEWAY_TENANT_ID
        value: omniforge
      - key: LLM_GATEWAY_API_KEY
        sync: false
      - key: LLM_GATEWAY_URL
        value: https://aegis-llm-gateway-api.onrender.com/v1
      - key: APP_ENV
        value: production
      - key: OMNIFORGE_MODE
        value: live
      - key: CORS_ORIGINS
        value: https://omniforge-flame.vercel.app,https://omniforge.vercel.app,https://venkat-ai.com,http://localhost:3000
      - key: OMNIFORGE_GOOGLE_MODEL
        value: gemini-2.0-flash
